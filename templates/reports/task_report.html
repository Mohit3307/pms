<h2>Task Report</h2>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Task Title</th>
<th>Project</th>
<th>Assigned To</th>
<th>Status</th>
<th>Priority</th>
<th>Deadline</th>
</tr>

{% for task in tasks %}

<tr>
<td>{{ task.id }}</td>
<td>{{ task.title }}</td>
<td>{{ task.project.title }}</td>
<td>{{ task.assignee.username }}</td>
<td>{{ task.status }}</td>
<td>{{ task.priority }}</td>
<td>{{ task.deadline }}</td>
</tr>

{% endfor %}

</table>
