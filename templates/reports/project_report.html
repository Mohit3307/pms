<h2>Project Report</h2>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Project Name</th>
<th>Description</th>
<th>Deadline</th>
<th>Status</th>
<th>Created By</th>
</tr>

{% for project in projects %}

<tr>
<td>{{ project.id }}</td>
<td>{{ project.title }}</td>
<td>{{ project.description }}</td>
<td>{{ project.deadline }}</td>
<td>{{ project.status }}</td>
<td>{{ project.created_by.username }}</td>
</tr>

{% endfor %}

</table>
