<!DOCTYPE html>
<html>
<head>
<title>Reports Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Reports Dashboard</h2>

<div class="row">

<div class="col-md-4">
<div class="card shadow">
<div class="card-body text-center">
<h4>Project Reports</h4>
<p>View all project details</p>
<a href="{% url 'project_report' %}" class="btn btn-primary">View Report</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<div class="card-body text-center">
<h4>Task Reports</h4>
<p>View task progress and status</p>
<a href="{% url 'task_report' %}" class="btn btn-success">View Report</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<div class="card-body text-center">
<h4>Team Reports</h4>
<p>View team members and assignments</p>
<a href="{% url 'team_report' %}" class="btn btn-warning">View Report</a>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
