{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Register</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>

</div>

{% endblock %}
