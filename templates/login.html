{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <div class="link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>

</div>

{% endblock %}
