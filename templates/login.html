{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>

</div>

{% endblock %}
